services:
  # ── MySQL ────────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: tech-portal-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-tech_portal_pro}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./dbdesign.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis ────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tech-portal-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./tech-portal-backend
      dockerfile: Dockerfile
    container_name: tech-portal-backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${DB_NAME:-tech_portal_pro}?useSSL=false&serverTimezone=UTC&characterEncoding=utf-8&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET}
      APP_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    networks:
      - internal
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health 2>/dev/null || wget -qO- http://localhost:8080/api/health 2>/dev/null || exit 0"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Nginx Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./tech-portal-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: tech-portal-frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    networks:
      - internal
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:

networks:
  internal:
    driver: bridge
