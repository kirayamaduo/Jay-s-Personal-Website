services:
  - type: web
    name: tech-portal-backend
    runtime: docker
    dockerfilePath: ./tech-portal-backend/Dockerfile
    dockerContext: ./tech-portal-backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        value: root
      - key: DB_PASSWORD
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
