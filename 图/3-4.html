<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图 3-4 顶层数据流图 (Context Diagram)</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --stroke-color: #000000;
            --fill-color: #ffffff;
            --text-color: #000000;
        }

        body {
            font-family: 'SimSun', '宋体', 'Microsoft YaHei', sans-serif; /* 学术报告常用字体 */
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .diagram-container {
            width: 800px;
            height: 500px;
            background-color: white;
            position: relative;
            /* 去掉网页风的圆角和阴影，改为简单的边框 */
            border: 1px solid #ccc; 
        }

        .diagram-title {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-weight: bold;
            font-size: 16px; /* 调整为标准字号 */
            color: var(--text-color);
            z-index: 2;
            font-family: '黑体', 'SimHei', sans-serif;
        }

        /* 外部实体：标准的矩形 */
        .entity {
            width: 100px;
            height: 60px; /* 稍微扁一点 */
            border: 2px solid var(--stroke-color);
            background-color: var(--fill-color);
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            z-index: 2;
            /* 去掉阴影 */
            box-shadow: 2px 2px 0px rgba(0,0,0,0.1); 
        }

        .entity-visitor { left: 60px; }
        .entity-admin { right: 60px; }

        /* 系统过程：标准的圆形 */
        .system-process {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background-color: var(--fill-color);
            border: 2px solid var(--stroke-color);
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .process-header {
            width: 100%;
            border-bottom: 1px solid var(--stroke-color);
            text-align: center;
            padding-bottom: 5px;
            margin-bottom: 5px;
            font-weight: bold;
            position: absolute;
            top: 30px;
        }
        
        .system-id {
            font-size: 14px;
        }

        .system-name {
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            color: var(--text-color);
            line-height: 1.4;
            margin-top: 10px;
        }

        /* 数据流标签 */
        .flow-label {
            position: absolute;
            font-size: 12px;
            color: var(--text-color);
            background-color: white; /* 遮挡线条 */
            padding: 2px 4px;
            z-index: 2;
            white-space: nowrap;
        }

        /* SVG Lines */
        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

    </style>
</head>
<body>

<div class="diagram-container">
    
    <!-- External Entity: Visitor -->
    <div class="entity entity-visitor">
        访客
    </div>

    <!-- Main System Process -->
    <div class="system-process">
        <div class="process-header">
            <span class="system-id">0</span>
        </div>
        <div class="system-name">个人技术<br>门户系统</div>
    </div>

    <!-- External Entity: Administrator -->
    <div class="entity entity-admin">
        管理员
    </div>

    <!-- Data Flow Labels -->
    <!-- Visitor -> System (Top) -->
    <div class="flow-label" style="left: 190px; top: 180px;">查询请求 / 筛选条件</div>
    
    <!-- System -> Visitor (Bottom) -->
    <div class="flow-label" style="left: 190px; top: 310px;">文章详情 / 项目信息</div>

    <!-- Admin -> System (Top) -->
    <div class="flow-label" style="right: 190px; top: 180px;">登录凭证 / 文章内容</div>

    <!-- System -> Admin (Bottom) -->
    <div class="flow-label" style="right: 190px; top: 310px;">统计报表 / 操作反馈</div>


    <!-- Connecting Lines -->
    <svg>
        <defs>
            <!-- 标准黑色箭头 -->
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#000000" />
            </marker>
        </defs>

        <!-- 左侧数据流 (Visitor <-> System) -->
        
        <!-- Visitor -> System (直线) -->
        <line x1="165" y1="200" x2="320" y2="200" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />

        <!-- System -> Visitor (直线) -->
        <line x1="320" y1="300" x2="165" y2="300" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />


        <!-- 右侧数据流 (Admin <-> System) -->
        
        <!-- Admin -> System (直线) -->
        <line x1="635" y1="200" x2="480" y2="200" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />

        <!-- System -> Admin (直线) -->
        <line x1="480" y1="300" x2="635" y2="300" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />

    </svg>

    <div class="diagram-title">图 3-4 顶层数据流图</div>
</div>

</body>
</html>
