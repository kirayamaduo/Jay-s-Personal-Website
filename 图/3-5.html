<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图 3-5 一层数据流图 (Level 1 DFD)</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --stroke-color: #000000;
            --fill-color: #ffffff;
            --text-color: #000000;
        }

        body {
            font-family: 'SimSun', '宋体', 'Microsoft YaHei', sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .diagram-container {
            width: 1000px;
            height: 700px;
            background-color: white;
            position: relative;
            border: 1px solid #ccc;
        }

        .diagram-title {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            color: var(--text-color);
            z-index: 2;
            font-family: '黑体', 'SimHei', sans-serif;
        }

        /* 外部实体：矩形 */
        .entity {
            width: 90px;
            height: 50px;
            border: 2px solid var(--stroke-color);
            background-color: var(--fill-color);
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            z-index: 2;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }

        /* 处理过程：圆形 */
        .process {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: var(--fill-color);
            border: 2px solid var(--stroke-color);
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .process-id {
            font-size: 12px;
            font-weight: bold;
            position: absolute;
            top: 15px;
            border-bottom: 1px solid var(--stroke-color);
            width: 60%;
            text-align: center;
            padding-bottom: 3px;
        }

        .process-name {
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            color: var(--text-color);
            line-height: 1.3;
            margin-top: 10px;
        }

        /* 数据存储：开口矩形 */
        .data-store {
            width: 120px;
            height: 36px;
            background-color: var(--fill-color);
            border-top: 2px solid var(--stroke-color);
            border-bottom: 2px solid var(--stroke-color);
            position: absolute;
            display: flex;
            align-items: center;
            z-index: 2;
        }

        .data-store-id {
            width: 30px;
            height: 100%;
            border-right: 2px solid var(--stroke-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .data-store-name {
            flex: 1;
            text-align: center;
            font-size: 12px;
            padding: 0 5px;
        }

        /* 数据流标签 */
        .flow-label {
            position: absolute;
            font-size: 11px;
            color: var(--text-color);
            background-color: white;
            padding: 1px 3px;
            z-index: 3;
            white-space: nowrap;
        }

        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

    </style>
</head>
<body>

<div class="diagram-container">
    
    <!-- ========== 外部实体 ========== -->
    
    <!-- 访客 -->
    <div class="entity" style="left: 40px; top: 200px;">
        访客
    </div>

    <!-- 管理员 -->
    <div class="entity" style="right: 40px; top: 200px;">
        管理员
    </div>

    <!-- ========== 处理过程 ========== -->

    <!-- P1: 内容浏览处理 -->
    <div class="process" style="left: 220px; top: 120px;">
        <div class="process-id">1</div>
        <div class="process-name">内容浏览<br>处理</div>
    </div>

    <!-- P2: 用户认证处理 -->
    <div class="process" style="left: 450px; top: 50px;">
        <div class="process-id">2</div>
        <div class="process-name">用户认证<br>处理</div>
    </div>

    <!-- P3: 内容管理处理 -->
    <div class="process" style="left: 680px; top: 120px;">
        <div class="process-id">3</div>
        <div class="process-name">内容管理<br>处理</div>
    </div>

    <!-- P4: 评论处理 -->
    <div class="process" style="left: 220px; top: 350px;">
        <div class="process-id">4</div>
        <div class="process-name">评论<br>处理</div>
    </div>

    <!-- P5: 消息处理 -->
    <div class="process" style="left: 680px; top: 350px;">
        <div class="process-id">5</div>
        <div class="process-name">消息<br>处理</div>
    </div>

    <!-- ========== 数据存储 ========== -->

    <!-- D1: 文章库 -->
    <div class="data-store" style="left: 440px; top: 180px;">
        <div class="data-store-id">D1</div>
        <div class="data-store-name">文章库</div>
    </div>

    <!-- D2: 项目库 -->
    <div class="data-store" style="left: 440px; top: 250px;">
        <div class="data-store-id">D2</div>
        <div class="data-store-name">项目库</div>
    </div>

    <!-- D3: 用户库 -->
    <div class="data-store" style="left: 440px; top: 530px;">
        <div class="data-store-id">D3</div>
        <div class="data-store-name">用户库</div>
    </div>

    <!-- D4: 评论库 -->
    <div class="data-store" style="left: 220px; top: 530px;">
        <div class="data-store-id">D4</div>
        <div class="data-store-name">评论库</div>
    </div>

    <!-- D5: 消息库 -->
    <div class="data-store" style="left: 660px; top: 530px;">
        <div class="data-store-id">D5</div>
        <div class="data-store-name">消息库</div>
    </div>

    <!-- ========== 数据流标签 ========== -->

    <!-- 访客 -> P1 -->
    <div class="flow-label" style="left: 145px; top: 165px;">查询请求</div>
    <!-- P1 -> 访客 -->
    <div class="flow-label" style="left: 145px; top: 255px;">内容列表</div>

    <!-- 访客 -> P4 -->
    <div class="flow-label" style="left: 100px; top: 320px;">评论内容</div>
    <!-- P4 -> 访客 -->
    <div class="flow-label" style="left: 100px; top: 400px;">评论列表</div>

    <!-- P1 <-> D1 -->
    <div class="flow-label" style="left: 345px; top: 155px;">文章数据</div>
    <!-- P1 <-> D2 -->
    <div class="flow-label" style="left: 345px; top: 235px;">项目数据</div>

    <!-- 管理员 -> P2 -->
    <div class="flow-label" style="left: 600px; top: 55px;">登录凭证</div>
    <!-- P2 -> 管理员 -->
    <div class="flow-label" style="left: 690px; top: 55px;">认证令牌</div>

    <!-- P2 <-> D3 -->
    <div class="flow-label" style="left: 505px; top: 135px;">用户验证</div>

    <!-- 管理员 -> P3 -->
    <div class="flow-label" style="left: 820px; top: 145px;">内容数据</div>
    <!-- P3 -> 管理员 -->
    <div class="flow-label" style="left: 820px; top: 205px;">操作反馈</div>

    <!-- P3 <-> D1 -->
    <div class="flow-label" style="left: 620px; top: 175px;">文章CRUD</div>
    <!-- P3 <-> D2 -->
    <div class="flow-label" style="left: 620px; top: 250px;">项目CRUD</div>

    <!-- P4 <-> D4 -->
    <div class="flow-label" style="left: 255px; top: 475px;">评论数据</div>

    <!-- 管理员 -> P5 -->
    <div class="flow-label" style="left: 830px; top: 355px;">查看/回复</div>
    <!-- P5 -> 管理员 -->
    <div class="flow-label" style="left: 830px; top: 415px;">消息列表</div>

    <!-- P5 <-> D5 -->
    <div class="flow-label" style="left: 715px; top: 475px;">消息数据</div>

    <!-- P4 <-> D1 (关联文章) -->
    <div class="flow-label" style="left: 370px; top: 320px;">文章ID</div>

    <!-- ========== 连接线 (SVG) ========== -->
    <svg>
        <defs>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#000000" />
            </marker>
        </defs>

        <!-- ===== 访客相关数据流 ===== -->
        
        <!-- 访客 -> P1 (内容浏览) -->
        <line x1="130" y1="200" x2="220" y2="170" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />
        
        <!-- P1 -> 访客 -->
        <line x1="220" y1="200" x2="130" y2="240" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />

        <!-- 访客 -> P4 (评论) -->
        <line x1="90" y1="250" x2="240" y2="350" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />
        
        <!-- P4 -> 访客 -->
        <line x1="240" y1="430" x2="90" y2="260" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />

        <!-- ===== P1 与数据存储 ===== -->
        
        <!-- P1 <-> D1 文章库 -->
        <line x1="320" y1="160" x2="440" y2="190" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />
        
        <!-- P1 <-> D2 项目库 -->
        <line x1="320" y1="190" x2="440" y2="260" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />

        <!-- ===== 管理员相关数据流 ===== -->
        
        <!-- 管理员 -> P2 (认证) -->
        <line x1="870" y1="200" x2="560" y2="85" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />
        
        <!-- P2 -> 管理员 -->
        <line x1="550" y1="100" x2="860" y2="205" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />

        <!-- 管理员 -> P3 (内容管理) -->
        <line x1="870" y1="210" x2="780" y2="160" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />
        
        <!-- P3 -> 管理员 -->
        <line x1="780" y1="190" x2="870" y2="230" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />

        <!-- 管理员 -> P5 (消息) -->
        <line x1="890" y1="250" x2="770" y2="365" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />
        
        <!-- P5 -> 管理员 -->
        <line x1="775" y1="400" x2="900" y2="260" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />

        <!-- ===== P2 与数据存储 ===== -->
        
        <!-- P2 <-> D3 用户库 -->
        <line x1="500" y1="150" x2="500" y2="530" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />

        <!-- ===== P3 与数据存储 ===== -->
        
        <!-- P3 <-> D1 文章库 -->
        <line x1="680" y1="175" x2="560" y2="195" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />
        
        <!-- P3 <-> D2 项目库 -->
        <line x1="680" y1="210" x2="560" y2="265" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />

        <!-- ===== P4 与数据存储 ===== -->
        
        <!-- P4 <-> D4 评论库 -->
        <line x1="270" y1="450" x2="280" y2="530" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />

        <!-- P4 -> D1 (关联文章ID) -->
        <line x1="310" y1="380" x2="440" y2="216" stroke="black" stroke-width="1.5" stroke-dasharray="5,3" />

        <!-- ===== P5 与数据存储 ===== -->
        
        <!-- P5 <-> D5 消息库 -->
        <line x1="730" y1="450" x2="720" y2="530" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />

    </svg>

    <div class="diagram-title">图 3-5 一层数据流图</div>
</div>

</body>
</html>
